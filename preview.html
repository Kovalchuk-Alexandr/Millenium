<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview</title>
    <style>
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
        }
        .cover-preview-wrapper {
            /* display: none; */
            padding-top: 20px;
            width: 0;
            height: 0;
            opacity: 0;
            transition: all 0.2s ease-in;
        }

        #cover-preview {
            width: 160px;
            height: auto;
            object-fit: cover;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    
    <label for="coverInput" class="form-label">Select new image</label>
    <!-- Preview загружаемого в input image -->
    <input class="form-control" id="coverInput" type="file" name="cover">
    <!-- <input type="file" class="form-control" name="cover" oninput="previewImage(this.files[0])" accept="image/*"> -->

    <div class="cover-preview-wrapper">
        <p>New image:</p>
        <img class="coverPreview" id="cover-preview" src="" alt="">
    </div>

<script>
    const previewUploadPostCover = () => {
        document.querySelector('#coverInput').addEventListener('input', function () {
            const preview = document.querySelector('.cover-preview-wrapper');
            const file = this.files[0];
            // console.log(file);
            if (!file) {
                preview.style.opacity = 0;
                preview.style.width = 0;
                preview.style.height = 0;
            }

            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
    
                reader.onload = ({
                    target
                }) => {
                    document.querySelector('#cover-preview').src = target.result;
                    preview.style.opacity = 1;
                    preview.style.width = "unset";
                    preview.style.height = "unset";

                };
                reader.readAsDataURL(file);
            }
        });
    }

    previewUploadPostCover();
</script>
</body>
</html>
